<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Restoration Route | Leaderboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * { box-sizing: border-box; }

    :root {
      --text: #f6f1e7;
      --muted: rgba(255,255,255,0.78);
      --gold: #c89b3c;
      --gold-dark: #a8781f;
      --panel-border: rgba(255,255,255,0.16);
      --panel-bg-a: rgba(96,96,96,0.96);
      --panel-bg-b: rgba(34,34,34,0.97);
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: "Rajdhani", Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.62)),
        radial-gradient(circle at top, #40372e 0%, #1d1a17 45%, #111 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.15;
      background:
        repeating-linear-gradient(90deg, transparent 0, transparent 58px, rgba(255,255,255,0.035) 59px, transparent 60px),
        repeating-linear-gradient(180deg, transparent 0, transparent 58px, rgba(255,255,255,0.03) 59px, transparent 60px);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 20px 40px;
      position: relative;
      z-index: 1;
    }

    .panel {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      background: linear-gradient(145deg, var(--panel-bg-a), var(--panel-bg-b));
      box-shadow:
        0 18px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(0,0,0,0.35);
      margin-bottom: 24px;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 10px;
      background: repeating-linear-gradient(45deg, #111 0 14px, var(--gold) 14px 28px);
    }

    .panel-inner { padding: 34px 24px 24px; }
    .brand-inner { padding: 40px 24px 28px; text-align: center; }

    .brand-title,
    .section-title,
    .table-title,
    .rank-number,
    .button-link {
      font-family: "Teko", Arial, sans-serif;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 0.95;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 3px 0 rgba(0,0,0,0.45), 0 0 18px rgba(200,155,60,0.18);
    }

    .brand-subline {
      margin-top: 12px;
      font-size: 16px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
    }

    .status {
      display: none;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 700;
      margin-bottom: 20px;
      position: sticky;
      top: 12px;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    .status.success {
      display: block;
      background: rgba(47,125,50,0.2);
      border: 1px solid rgba(120,210,130,0.4);
      color: #dff5e1;
    }

    .status.error {
      display: block;
      background: rgba(178,33,33,0.2);
      border: 1px solid rgba(255,138,138,0.42);
      color: #ffdede;
    }

    .status.info {
      display: block;
      background: rgba(60,115,200,0.2);
      border: 1px solid rgba(145,185,255,0.35);
      color: #e4efff;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-block {
      text-align: center;
      padding: 18px 16px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.16)),
        linear-gradient(145deg, rgba(80,80,80,0.88), rgba(30,30,30,0.95));
      border: 1px solid rgba(255,255,255,0.14);
    }

    .summary-number {
      font-size: 38px;
      font-weight: 800;
      font-family: "Teko", Arial, sans-serif;
      letter-spacing: 1px;
    }

    .summary-label {
      margin-top: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.75);
    }

    .section-title,
    .table-title {
      margin: 0 0 10px;
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: center;
    }

    .section-text {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 18px;
      text-align: center;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 18px;
      background: linear-gradient(180deg, #d7aa43, #a9781f);
      color: #1a1205;
    }

    .leaderboard-list {
      display: grid;
      gap: 12px;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 86px 1fr 150px;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.16)),
        linear-gradient(145deg, rgba(80,80,80,0.88), rgba(30,30,30,0.95));
      border: 1px solid rgba(255,255,255,0.14);
    }

    .leaderboard-row.is-me {
      border-color: rgba(200,155,60,0.65);
      box-shadow: 0 0 0 1px rgba(200,155,60,0.25) inset;
    }

    .rank-number {
      font-size: 42px;
      line-height: 1;
      text-align: center;
      color: #ffe8b0;
    }

    .player-name {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
    }

    .player-sub {
      margin-top: 4px;
      font-size: 14px;
      color: rgba(255,255,255,0.68);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .player-score {
      text-align: center;
    }

    .score-number {
      font-size: 40px;
      font-family: "Teko", Arial, sans-serif;
      line-height: 1;
    }

    .score-label {
      margin-top: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: rgba(255,255,255,0.8);
      font-size: 18px;
    }

    @media (max-width: 760px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .leaderboard-row {
        grid-template-columns: 72px 1fr;
      }

      .player-score {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      .brand-inner,
      .panel-inner { padding: 30px 18px 20px; }

      .button-row {
        flex-direction: column;
      }

      .button-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="brand-inner">
        <h1 class="brand-title">The Restoration Route</h1>
        <div class="brand-subline">Leaderboard</div>
      </div>
    </div>

    <div id="statusBox" class="status"></div>

    <div class="panel">
      <div class="panel-inner">
        <h2 class="section-title">Leaderboard</h2>
        <p class="section-text">This board shows registered users with approved public usernames. Guest accounts do not appear here.</p>

        <div class="summary-grid">
          <div class="summary-block">
            <div id="totalNamedPlayers" class="summary-number">0</div>
            <div class="summary-label">Named Drivers</div>
          </div>
          <div class="summary-block">
            <div id="myPosition" class="summary-number">—</div>
            <div class="summary-label">Your Position</div>
          </div>
        </div>

        <div class="button-row">
          <a href="./index.html" class="button-link">Back to Route</a>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-inner">
        <h3 class="table-title">Top Restorers</h3>
        <div id="leaderboardList" class="leaderboard-list"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBSSekdM7t9zc_ee0kQ5xSBFYNvRN53PV0",
      authDomain: "the-restoration-route.firebaseapp.com",
      projectId: "the-restoration-route",
      storageBucket: "the-restoration-route.firebasestorage.app",
      messagingSenderId: "878380399095",
      appId: "1:878380399095:web:6a16f26fedce5f1f9c96f2",
      measurementId: "G-0PLZQ6B8HT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusBox = document.getElementById("statusBox");
    const leaderboardList = document.getElementById("leaderboardList");
    const totalNamedPlayers = document.getElementById("totalNamedPlayers");
    const myPosition = document.getElementById("myPosition");

    let currentUid = null;

    function showStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadLeaderboard() {
      clearStatus();

      try {
        const q = query(collection(db, "leaderboard"), orderBy("completedVehicles", "desc"), limit(100));
        const snap = await getDocs(q);

        const rows = snap.docs
          .map((docSnap) => {
            const data = docSnap.data();
            return {
              uid: docSnap.id,
              username: typeof data.username === "string" ? data.username : "",
              completedVehicles: Number.isFinite(data.completedVehicles) ? data.completedVehicles : 0,
              isRegistered: data.isRegistered === true
            };
          })
          .filter((row) => row.isRegistered && row.username);

        rows.sort((a, b) => {
          if (b.completedVehicles !== a.completedVehicles) {
            return b.completedVehicles - a.completedVehicles;
          }
          return a.username.localeCompare(b.username);
        });

        totalNamedPlayers.textContent = String(rows.length);

        const myIndex = rows.findIndex((row) => row.uid === currentUid);
        myPosition.textContent = myIndex >= 0 ? String(myIndex + 1) : "—";

        if (!rows.length) {
          leaderboardList.innerHTML = `<div class="empty-state">No named users are on the board yet.</div>`;
          return;
        }

        leaderboardList.innerHTML = rows.map((row, index) => `
          <div class="leaderboard-row ${row.uid === currentUid ? "is-me" : ""}">
            <div class="rank-number">#${index + 1}</div>

            <div>
              <div class="player-name">${escapeHtml(row.username)}</div>
              <div class="player-sub">${row.uid === currentUid ? "You" : "Registered Driver"}</div>
            </div>

            <div class="player-score">
              <div class="score-number">${row.completedVehicles}</div>
              <div class="score-label">Vehicles Restored</div>
            </div>
          </div>
        `).join("");
      } catch (error) {
        leaderboardList.innerHTML = "";
        showStatus(error.message || "Could not load the leaderboard.", "error");
      }
    }

    onAuthStateChanged(auth, async (user) => {
      currentUid = user?.uid || null;
      await loadLeaderboard();
    });
  </script>
</body>
</html>
