<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Restoration Route | Garage</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * { box-sizing: border-box; }

    :root {
      --text: #f6f1e7;
      --muted: rgba(255,255,255,0.78);
      --gold: #c89b3c;
      --gold-dark: #a8781f;
      --panel-border: rgba(255,255,255,0.16);
      --panel-bg-a: rgba(96,96,96,0.96);
      --panel-bg-b: rgba(34,34,34,0.97);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Rajdhani", Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.62)),
        radial-gradient(circle at top, #40372e 0%, #1d1a17 45%, #111 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.15;
      background:
        repeating-linear-gradient(90deg, transparent 0, transparent 58px, rgba(255,255,255,0.035) 59px, transparent 60px),
        repeating-linear-gradient(180deg, transparent 0, transparent 58px, rgba(255,255,255,0.03) 59px, transparent 60px);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 20px 40px;
      position: relative;
      z-index: 1;
    }

    .panel {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      background: linear-gradient(145deg, var(--panel-bg-a), var(--panel-bg-b));
      box-shadow:
        0 18px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(0,0,0,0.35);
      margin-bottom: 24px;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 10px;
      background: repeating-linear-gradient(45deg, #111 0 14px, var(--gold) 14px 28px);
    }

    .panel-inner {
      padding: 34px 24px 24px;
    }

    .brand-inner {
      padding: 40px 24px 28px;
      text-align: center;
    }

    .brand-title,
    .venue-name,
    .section-title,
    .back-link {
      font-family: "Teko", Arial, sans-serif;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 0.95;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 3px 0 rgba(0,0,0,0.45), 0 0 18px rgba(200,155,60,0.18);
    }

    .brand-subline {
      margin-top: 12px;
      font-size: 16px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.72);
    }

    .status {
      display: none;
      padding: 14px 16px;
      border-radius: 14px;
      font-weight: 700;
      margin-bottom: 20px;
      position: sticky;
      top: 12px;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    .status.success {
      display: block;
      background: rgba(47,125,50,0.2);
      border: 1px solid rgba(120,210,130,0.4);
      color: #dff5e1;
    }

    .status.error {
      display: block;
      background: rgba(178,33,33,0.2);
      border: 1px solid rgba(255,138,138,0.42);
      color: #ffdede;
    }

    .status.info {
      display: block;
      background: rgba(60,115,200,0.2);
      border: 1px solid rgba(145,185,255,0.35);
      color: #e4efff;
    }

    .hidden { display: none !important; }

    .venue-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .venue-part {
      display: inline-block;
      margin-bottom: 14px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(200,155,60,0.18);
      border: 1px solid rgba(200,155,60,0.35);
      color: #ffe8b0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .venue-name {
      margin: 0 0 8px;
      font-size: clamp(34px, 7vw, 58px);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .venue-quip {
      margin: 0 auto;
      max-width: 680px;
      color: rgba(255,255,255,0.82);
      font-size: 20px;
      line-height: 1.35;
      font-weight: 600;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1.12fr;
      gap: 18px;
      align-items: start;
    }

    .details-grid {
      display: grid;
      gap: 14px;
    }

    .detail-card {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 12px 14px;
      text-align: center;
    }

    .detail-block-title {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ffe2a0;
      text-align: center;
    }

    .detail-lines {
      color: rgba(255,255,255,0.88);
      line-height: 1.55;
      font-size: 18px;
      text-align: center;
    }

    .hours-grid {
      display: grid;
      gap: 8px;
    }

    .hours-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      align-items: start;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
    }

    .hours-day {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #ffe2a0;
      text-align: left;
    }

    .hours-time {
      font-size: 17px;
      color: rgba(255,255,255,0.92);
      line-height: 1.4;
      text-align: right;
    }

    .hours-food {
      margin-top: 2px;
      font-size: 14px;
      color: rgba(255,255,255,0.68);
      line-height: 1.3;
      text-align: right;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 22px;
    }

    .action-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 136px;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
      font-size: 16px;
    }

    .action-link.website,
    .action-link.social {
      background: linear-gradient(180deg, #f4f0e7, #ddd3c0);
      color: #1f1f1f;
    }

    .action-link.map {
      background: linear-gradient(180deg, var(--gold), var(--gold-dark));
      color: #1a1205;
    }

    .back-link {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 24px;
      color: #1a1205;
      background: linear-gradient(180deg, #d7aa43, #a9781f);
      box-shadow: 0 16px 30px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.28);
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    .back-link.secret-armed {
      outline: 2px dashed rgba(255,255,255,0.28);
      outline-offset: 2px;
    }

    .error-box {
      text-align: center;
      padding: 30px 18px;
    }

    .error-title {
      margin: 0 0 12px;
      font-family: "Teko", Arial, sans-serif;
      font-size: 42px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .error-text {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      color: rgba(255,255,255,0.8);
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .hours-row {
        grid-template-columns: 78px 1fr;
      }

      .actions {
        flex-direction: column;
      }

      .action-link {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .brand-inner,
      .panel-inner {
        padding: 30px 18px 20px;
      }

      .venue-quip {
        font-size: 18px;
      }

      .back-link {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="brand-inner">
        <h1 class="brand-title">The Restoration Route</h1>
        <div class="brand-subline">Garage Details</div>
      </div>
    </div>

    <div id="statusBox" class="status"></div>

    <div id="venuePanel" class="panel hidden">
      <div class="panel-inner">
        <div class="venue-header">
          <div id="venuePart" class="venue-part"></div>
          <h2 id="venueName" class="venue-name"></h2>
          <p id="venueQuip" class="venue-quip"></p>
        </div>

        <div class="layout">
          <div class="details-grid">
            <div class="detail-card">
              <div class="detail-block-title">Address</div>
              <div id="venueAddress" class="detail-lines"></div>
            </div>

            <div class="detail-card">
              <div class="detail-block-title">Phone</div>
              <div id="venuePhone" class="detail-lines"></div>
            </div>

            <div class="detail-card">
              <div class="detail-block-title">Email</div>
              <div id="venueEmail" class="detail-lines"></div>
            </div>
          </div>

          <div>
            <div class="detail-block-title">Opening Hours</div>
            <div id="venueHours" class="hours-grid"></div>
          </div>
        </div>

        <div id="venueActions" class="actions"></div>

        <!-- CHIP SECRET BUTTON FEATURE START -->
        <!-- Delete this whole marked HTML/behaviour hook if you want to remove the secret unlock route. -->
        <!-- Search for CHIP SECRET BUTTON FEATURE START and END in this file. -->
        <!-- This back button doubles as the Long Itch Diner long-press secret trigger. -->
        <!-- The main page contains the visible Chip's Big Red Button panel. -->
        <a id="venueBackLink" class="back-link" href="./index.html">Back to The Restoration Route</a>
        <!-- CHIP SECRET BUTTON FEATURE END -->
        <!-- Delete this whole marked HTML/behaviour hook if you want to remove the secret unlock route. -->
        <!-- Search for CHIP SECRET BUTTON FEATURE START and END in this file. -->
        <!-- This back button doubles as the Long Itch Diner long-press secret trigger. -->
        <!-- The main page contains the visible Chip's Big Red Button panel. -->
      </div>
    </div>

    <div id="errorPanel" class="panel hidden">
      <div class="panel-inner">
        <div class="error-box">
          <h2 class="error-title">Garage Not Found</h2>
          <p class="error-text">That garage page could not be loaded. Go back to the route and choose another stop.</p>
          <a class="back-link" href="./index.html">Back to The Restoration Route</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      DAY_ORDER,
      ROUTE_VENUES,
      ALIAS_MAP,
      normalizeVenueValue
    } from "./route-data.js";

    const SECRET_STORAGE_KEY = "chipWorkshopOverride";
    const SECRET_HOLD_MS = 10000;
    const SECRET_PASSWORD = "watson";

    const statusBox = document.getElementById("statusBox");
    const venuePanel = document.getElementById("venuePanel");
    const errorPanel = document.getElementById("errorPanel");

    const venuePart = document.getElementById("venuePart");
    const venueName = document.getElementById("venueName");
    const venueQuip = document.getElementById("venueQuip");
    const venueAddress = document.getElementById("venueAddress");
    const venuePhone = document.getElementById("venuePhone");
    const venueEmail = document.getElementById("venueEmail");
    const venueHours = document.getElementById("venueHours");
    const venueActions = document.getElementById("venueActions");
    const venueBackLink = document.getElementById("venueBackLink");

    let statusHideTimer = null;
    let secretHoldTimer = null;
    let suppressNextBackClick = false;

    function showStatus(message, type = "info", autoHideMs = 0) {
      if (statusHideTimer) {
        clearTimeout(statusHideTimer);
        statusHideTimer = null;
      }

      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
      window.scrollTo({ top: 0, behavior: "smooth" });

      if (autoHideMs > 0) {
        statusHideTimer = window.setTimeout(() => {
          clearStatus();
        }, autoHideMs);
      }
    }

    function clearStatus() {
      if (statusHideTimer) {
        clearTimeout(statusHideTimer);
        statusHideTimer = null;
      }
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function buildMapUrl(query) {
      return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(query)}`;
    }

    function getVenueFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const rawGarage = params.get("garage");
      if (!rawGarage) return null;

      const normalized = normalizeVenueValue(rawGarage);
      const partKey = ALIAS_MAP[normalized] || null;
      if (!partKey) return null;

      return ROUTE_VENUES.find((venue) => venue.partKey === partKey) || null;
    }

    function renderOpeningHours(venue) {
      return DAY_ORDER.map((day) => {
        const open = venue.opening[day] || "Closed";
        const food = venue.food[day] || "";
        return `
          <div class="hours-row">
            <div class="hours-day">${escapeHtml(day)}</div>
            <div class="hours-time">
              <div>${escapeHtml(open)}</div>
              ${food ? `<div class="hours-food">${escapeHtml(food)}</div>` : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderSocialLinks(venue) {
      const buttons = [];
      if (venue.socials.facebook) {
        buttons.push(`<a class="action-link social" href="${venue.socials.facebook}" target="_blank" rel="noopener noreferrer">Facebook</a>`);
      }
      if (venue.socials.instagram) {
        buttons.push(`<a class="action-link social" href="${venue.socials.instagram}" target="_blank" rel="noopener noreferrer">Instagram</a>`);
      }
      return buttons.join("");
    }

    function renderVenue(venue) {
      venuePart.textContent = `Repairs: ${venue.partLabel}`;
      venueName.textContent = venue.name;
      venueQuip.textContent = venue.quip;
      venueAddress.innerHTML = venue.address.map((line) => `<div>${escapeHtml(line)}</div>`).join("");

      if (venue.phone === "—") {
        venuePhone.innerHTML = `<div>—</div>`;
      } else {
        venuePhone.innerHTML = `<div><a href="tel:${venue.phone.replace(/\s+/g, "")}" style="color:inherit;text-decoration:none;">${escapeHtml(venue.phone)}</a></div>`;
      }

      if (venue.email === "Use website contact form") {
        venueEmail.innerHTML = `<div>Use website contact form</div>`;
      } else if (venue.email === "—") {
        venueEmail.innerHTML = `<div>—</div>`;
      } else {
        venueEmail.innerHTML = `<div><a href="mailto:${escapeHtml(venue.email)}" style="color:inherit;text-decoration:none;">${escapeHtml(venue.email)}</a></div>`;
      }

      venueHours.innerHTML = renderOpeningHours(venue);

      venueActions.innerHTML = `
        <a class="action-link website" href="${venue.website}" target="_blank" rel="noopener noreferrer">Website</a>
        <a class="action-link map" href="${buildMapUrl(venue.mapQuery)}" target="_blank" rel="noopener noreferrer">Directions</a>
        ${renderSocialLinks(venue)}
      `;

      venuePanel.classList.remove("hidden");
      errorPanel.classList.add("hidden");
    }

    /* CHIP SECRET BUTTON FEATURE START */
    /* Delete this whole marked JavaScript block if you want to remove the secret unlock route. */
    /* Search for CHIP SECRET BUTTON FEATURE START and END in this file. */
    /* This block controls the Long Itch Diner back-button hold and password unlock. */
    /* The main page contains the visible Chip's Big Red Button panel. */
    function clearSecretHold() {
      if (secretHoldTimer) {
        clearTimeout(secretHoldTimer);
        secretHoldTimer = null;
      }
      venueBackLink.classList.remove("secret-armed");
    }

    function unlockSecretAndReturn() {
      const enteredPassword = window.prompt("Workshop override password:");
      if (enteredPassword === null) {
        showStatus("Workshop override cancelled.", "info", 2500);
        return;
      }

      if (enteredPassword.trim().toLowerCase() === SECRET_PASSWORD) {
        localStorage.setItem(SECRET_STORAGE_KEY, "unlocked");
        showStatus("Workshop override unlocked. Returning to the route.", "success", 1800);
        window.setTimeout(() => {
          window.location.href = "./index.html";
        }, 1000);
      } else {
        showStatus("Incorrect password.", "error", 4000);
      }
    }

    function wireSecretUnlockForVenue(venue) {
      if (venue.partKey !== "transmission") {
        return;
      }

      venueBackLink.setAttribute("data-secret-trigger", "true");

      venueBackLink.addEventListener("pointerdown", () => {
        clearSecretHold();
        venueBackLink.classList.add("secret-armed");

        secretHoldTimer = window.setTimeout(() => {
          suppressNextBackClick = true;
          clearSecretHold();
          unlockSecretAndReturn();
        }, SECRET_HOLD_MS);
      });

      venueBackLink.addEventListener("pointerup", clearSecretHold);
      venueBackLink.addEventListener("pointercancel", clearSecretHold);
      venueBackLink.addEventListener("pointerleave", clearSecretHold);

      venueBackLink.addEventListener("click", (event) => {
        if (suppressNextBackClick) {
          event.preventDefault();
          suppressNextBackClick = false;
        }
      });
    }
    /* CHIP SECRET BUTTON FEATURE END */
    /* Delete this whole marked JavaScript block if you want to remove the secret unlock route. */
    /* Search for CHIP SECRET BUTTON FEATURE START and END in this file. */
    /* This block controls the Long Itch Diner back-button hold and password unlock. */
    /* The main page contains the visible Chip's Big Red Button panel. */

    function initPage() {
      clearStatus();

      const venue = getVenueFromUrl();
      if (!venue) {
        venuePanel.classList.add("hidden");
        errorPanel.classList.remove("hidden");
        showStatus("This garage page is invalid or missing.", "error");
        return;
      }

      renderVenue(venue);
      wireSecretUnlockForVenue(venue);
    }

    initPage();
  </script>
</body>
</html>
