<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repaired Stamp</title>

  <script>
    (function () {
      const storageKey = "repaired-stamp-seen-v1";

      try {
        if (!localStorage.getItem(storageKey)) {
          document.documentElement.classList.add("first-visit");
        }
      } catch (e) {
        document.documentElement.classList.add("first-visit");
      }
    })();
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #efefef;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .stage {
      position: relative;
      width: min(92vw, 820px);
      height: min(70vh, 560px);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
    }

    .shadow {
      position: absolute;
      width: 62%;
      height: 14%;
      background: rgba(0, 0, 0, 0.16);
      border-radius: 999px;
      filter: blur(22px);
      transform: translateY(55px) scale(1);
      opacity: 0.1;
    }

    .stamp {
      position: relative;
      width: min(78vw, 560px);
      max-width: 100%;
      display: block;
      transform-origin: center center;
      transform: translateY(0) scale(1) rotate(-7deg);
      opacity: 1;
      filter: blur(0);
      will-change: transform, opacity, filter;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    html.first-visit .shadow {
      opacity: 0;
      transform: translateY(18px) scale(0.45);
      animation: shadowHit 0.95s ease-out forwards;
    }

    html.first-visit .stamp {
      transform: translateY(-340px) scale(1.55) rotate(-7deg);
      opacity: 0;
      filter: blur(7px);
      animation: stampDown 0.95s ease-out forwards;
    }

    @keyframes stampDown {
      0% {
        transform: translateY(-340px) scale(1.55) rotate(-7deg);
        opacity: 0;
        filter: blur(7px);
      }
      58% {
        transform: translateY(8px) scale(1.02, 0.92) rotate(-7deg);
        opacity: 1;
        filter: blur(0.3px);
      }
      72% {
        transform: translateY(-4px) scale(0.97, 1.04) rotate(-7deg);
        opacity: 1;
        filter: blur(0);
      }
      86% {
        transform: translateY(1px) scale(1.01, 0.99) rotate(-7deg);
        opacity: 1;
        filter: blur(0);
      }
      100% {
        transform: translateY(0) scale(1) rotate(-7deg);
        opacity: 1;
        filter: blur(0);
      }
    }

    @keyframes shadowHit {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(0.45);
      }
      58% {
        opacity: 0.2;
        transform: translateY(55px) scale(1.04);
      }
      100% {
        opacity: 0.1;
        transform: translateY(55px) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="stage" aria-label="Repaired stamp">
    <div class="shadow"></div>
    <img
      class="stamp"
      alt="Repaired stamp"
      src="./Repaired%20Stamp.PNG"
    />
  </div>

  <script>
    (function () {
      const storageKey = "repaired-stamp-seen-v1";

      if (document.documentElement.classList.contains("first-visit")) {
        try {
          localStorage.setItem(storageKey, "true");
        } catch (e) {
          // Ignore storage errors
        }
      }
    })();
  </script>
</body>
</html>
